<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4F46E5" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Shine overlay -->
  <rect width="512" height="256" rx="110" fill="url(#shine)"/>

  <!-- Book body -->
  <g transform="translate(256,270) rotate(-4)">
    <!-- Back cover -->
    <rect x="-120" y="-130" width="240" height="170" rx="12" fill="#3730A3" opacity="0.8"/>
    <!-- Spine shadow -->
    <rect x="-120" y="-130" width="20" height="170" rx="4" fill="#312E81" opacity="0.6"/>
    <!-- Pages (white block) -->
    <rect x="-108" y="-122" width="216" height="158" rx="6" fill="#EEF2FF"/>
    <!-- Page lines -->
    <rect x="-80" y="-90" width="140" height="6" rx="3" fill="#C7D2FE" opacity="0.8"/>
    <rect x="-80" y="-70" width="100" height="6" rx="3" fill="#C7D2FE" opacity="0.8"/>
    <rect x="-80" y="-50" width="120" height="6" rx="3" fill="#C7D2FE" opacity="0.8"/>
    <rect x="-80" y="-30" width="80"  height="6" rx="3" fill="#C7D2FE" opacity="0.8"/>
    <!-- Front cover -->
    <rect x="-112" y="-128" width="224" height="164" rx="10" fill="#6366F1"/>
    <!-- Cover shine -->
    <rect x="-112" y="-128" width="224" height="70" rx="10" fill="white" opacity="0.08"/>
    <!-- シ mark on cover -->
    <text x="0" y="-52" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="64" fill="white" opacity="0.9" letter-spacing="-2">シ</text>
    <!-- Subtitle line -->
    <rect x="-60" y="-5" width="120" height="6" rx="3" fill="white" opacity="0.4"/>
    <rect x="-40" y="10" width="80"  height="4" rx="2" fill="white" opacity="0.25"/>
  </g>

  <!-- AI sparkle top-right -->
  <g transform="translate(370,130)">
    <circle r="28" fill="#F59E0B"/>
    <!-- Star shape -->
    <polygon points="0,-16 4,-5 15,-5 7,2 10,14 0,8 -10,14 -7,2 -15,-5 -4,-5" fill="white"/>
  </g>

  <!-- Small sparkles -->
  <circle cx="145" cy="140" r="8" fill="white" opacity="0.4"/>
  <circle cx="120" cy="175" r="5" fill="white" opacity="0.25"/>
  <circle cx="390" cy="370" r="6" fill="white" opacity="0.3"/>

  <!-- Bottom label pill -->
  <rect x="156" y="418" width="200" height="42" rx="21" fill="white" opacity="0.15"/>
  <text x="256" y="446" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="22" fill="white" letter-spacing="2">SHIKAKUN</text>
</svg>
